settings:
  simulation_time: 100
  num_clients: 500
  limit_closest_base_stations: 7

  statistics_params:
    warmup_ratio: 0.05
    cooldown_ratio: 0.05
    x:
      min: 0
      max: 1980
    y:
      min: 0
      max: 1980

  logging: False
  log_file: output.txt

  plotting_params:
    plotting: True
    plot_save: True
    plot_show: True
    plot_file: improved.png
    plot_file_dpi: 1000
    scatter_size: 15

slices:
  embb:
    delay_tolerance: 2000
    qos_class: 4
    bandwidth_guaranteed: 1000
    bandwidth_max: 100000000
    client_weight: 0.4
    threshold: 0.87
    usage_pattern:
      distribution: randint
      params: [4000000, 800000000]

  mmtc:
    delay_tolerance: 50
    qos_class: 3
    bandwidth_guaranteed: 5
    bandwidth_max: 10000000
    client_weight: 0.4
    threshold: 0.8
    usage_pattern:
      distribution: randint
      params: [4000000, 800000000]

  urllc:
    delay_tolerance: 10
    qos_class: 2
    bandwidth_guaranteed: 10
    bandwidth_max: 10000000
    client_weight: 0.2
    threshold: 0.8
    usage_pattern:
      distribution: randint
      params: [4000000, 800000000]

base_stations:
  - x: 0
    y: 0
    coverage: 1200
    capacity_bandwidth: 3000000
    ratios: {embb: 0.6, mmtc: 0.3, urllc: 0.1}

  - x: 1000
    y: 500
    coverage: 1200
    capacity_bandwidth: 3000000
    ratios: {embb: 0.8, mmtc: 0.15, urllc: 0.05}

  - x: -500
    y: -500
    coverage: 1200
    capacity_bandwidth: 3000000
    ratios: {embb: 0.76, mmtc: 0.18, urllc: 0.06}

mobility_patterns:
  basic:
    distribution: randint
    params: [-1, 1]
    client_weight: 1.0

clients:
  location:
    x:
      distribution: normal
      params: [0, 600]
    y:
      distribution: normal
      params: [0, 600]

  usage:
    distribution: randint
    params: [0, 100000]

  usage_frequency:
    distribution: randint
    params: [0, 100000]
    divide_scale: 1000000